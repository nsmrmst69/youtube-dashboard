<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YouTube 報告自動化ツール｜システム構成図</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    header {
      text-align: center;
      margin-bottom: 32px;
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #f0f6fc;
      margin-bottom: 8px;
    }

    header p {
      font-size: 0.875rem;
      color: #8b949e;
    }

    .diagram-container {
      width: 100%;
      max-width: 1100px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    .diagram-container img {
      width: 100%;
      height: auto;
      display: block;
    }

    .download-bar {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 24px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .btn:hover { opacity: 0.85; }

    .btn-primary {
      background: #238636;
      color: #fff;
      border: 1px solid #2ea043;
    }

    .btn-secondary {
      background: #21262d;
      color: #e6edf3;
      border: 1px solid #30363d;
    }

    footer {
      margin-top: 40px;
      font-size: 0.75rem;
      color: #484f58;
    }
  </style>
</head>
<body>

  <header>
    <h1>YouTube 報告自動化ツール｜システム構成図</h1>
    <p>毎朝10時に自動実行 → Googleスプレッドシートからデータ取得 → ダッシュボード生成 → Googleドライブへ自動アップロード</p>
  </header>

  <div class="diagram-container">
    <img src="system-architecture.png" alt="システム構成図" />
  </div>

  <div class="download-bar">
    <a class="btn btn-primary" href="system-architecture.png" download="youtube-dashboard-architecture.png">
      ⬇ PNG をダウンロード
    </a>
    <a class="btn btn-secondary" href="index.html">
      📊 ダッシュボードのモックを見る
    </a>
  </div>

  <footer>YouTube Dashboard Automation — Architecture Overview</footer>

</body>
</html>
